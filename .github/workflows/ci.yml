name: CI

on:
  push:
    branches: [main, "refactor/**", "feature/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The linguistic core (g2p, scoring) is dependency-free, so the test
      # job stays fast: no torch/transformers install needed.
      - name: Install test dependencies
        run: pip install pytest
      - name: Unit tests (G2P rules, alignment, error taxonomy)
        run: python -m pytest tests/ -q
      - name: G2P held-out regression gate (in-scope must stay 100%)
        run: python experiments/exp3_g2p_heldout.py --check
